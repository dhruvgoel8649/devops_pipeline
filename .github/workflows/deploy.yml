name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to Amazon ECR
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build Backend Image
      run: |
        docker build -t backend:${{ github.sha }} ./backend
        docker tag backend:${{ github.sha }} ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_BACKEND_REPO }}:${{ github.sha }}

    - name: Build Frontend Image
      run: |
        docker build -t frontend:${{ github.sha }} ./frontend
        docker tag frontend:${{ github.sha }} ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}
        docker push ${{ secrets.ECR_FRONTEND_REPO }}:${{ github.sha }}