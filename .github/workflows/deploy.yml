name: Full CI/CD Pipeline

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
  FRONTEND_REPO: ${{ secrets.ECR_FRONTEND_REPO }}
  IMAGE_TAG: ${{ github.sha }} # Define globally so all steps see it

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Backend
        run: |
          docker build -t $BACKEND_REPO:$IMAGE_TAG ./backend
          docker push $BACKEND_REPO:$IMAGE_TAG

      - name: Build and Push Frontend
        run: |
          docker build -t $FRONTEND_REPO:$IMAGE_TAG ./frontend
          docker push $FRONTEND_REPO:$IMAGE_TAG

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init & Apply
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Get EC2 Public IP
        id: terraform_output
        working-directory: ./terraform
        run: |
          # Use GITHUB_OUTPUT for modern best practices
          echo "ip=$(terraform output -raw public_ip)" >> $GITHUB_OUTPUT

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ steps.terraform_output.outputs.ip }}
          username: ec2-user # or 'ubuntu' depending on your AMI
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: IMAGE_TAG,BACKEND_REPO,FRONTEND_REPO,AWS_REGION
          script: |
            aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $BACKEND_REPO
            
            docker pull $BACKEND_REPO:$IMAGE_TAG
            docker pull $FRONTEND_REPO:$IMAGE_TAG

            docker stop backend frontend || true
            docker rm backend frontend || true

            docker run -d --name backend -p 8000:8000 $BACKEND_REPO:$IMAGE_TAG
            docker run -d --name frontend -p 80:80 $FRONTEND_REPO:$IMAGE_TAG
